# Minimal standalone Apache config to run the modernized TalentWiz on port 8080.
# Reuses the WAMP Apache 2.4.2 binaries/modules and PHP 5.4.3, but serves this
# repo instead of c:/wamp/www. Does not modify the existing WAMP config.
#
# Run with:
#   c:/wamp/bin/apache/apache2.4.2/bin/httpd.exe -f <path-to-this-file>

ServerRoot "c:/wamp/bin/apache/apache2.4.2"
PidFile "d:/practice/VSCode/CollegeProject/TalentWiz_modernized/.apache-run.pid"
Listen 8080
ServerName localhost:8080

# --- Core modules ---
LoadModule authz_core_module modules/mod_authz_core.so
LoadModule mime_module modules/mod_mime.so
LoadModule dir_module modules/mod_dir.so
LoadModule log_config_module modules/mod_log_config.so

# --- PHP (same module WAMP uses) ---
LoadModule php5_module "c:/wamp/bin/php/php5.4.3/php5apache2_4.dll"
PHPIniDir "c:/wamp/bin/php/php5.4.3"
AddType application/x-httpd-php .php
DirectoryIndex index.php index.html

# --- Document root = this repo ---
DocumentRoot "d:/practice/VSCode/CollegeProject/TalentWiz_modernized"
<Directory "d:/practice/VSCode/CollegeProject/TalentWiz_modernized">
    Options Indexes FollowSymLinks
    AllowOverride None
    Require all granted
</Directory>

ErrorLog "d:/practice/VSCode/CollegeProject/TalentWiz_modernized/.apache-error.log"
LogLevel warn
